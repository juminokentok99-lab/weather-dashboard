<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌤️ Weather Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1><i class="fas fa-cloud-sun"></i> Weather Dashboard</h1>
                <p>Real-time weather information for any city</p>
            </div>
        </header>

        <!-- Search Section -->
        <section class="search-section">
            <div class="search-box">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Search city name..."
                    autocomplete="off"
                >
                <button id="searchBtn" class="search-btn">
                    <i class="fas fa-search"></i> Search
                </button>
                <button id="locationBtn" class="location-btn" title="Use current location">
                    <i class="fas fa-map-marker-alt"></i>
                </button>
            </div>
            <div id="suggestions" class="suggestions"></div>
            <p id="errorMsg" class="error-msg"></p>
        </section>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Current Weather -->
            <section id="currentWeather" class="current-weather hidden">
                <div class="weather-card">
                    <div class="weather-header">
                        <div class="location-info">
                            <h2 id="cityName"></h2>
                            <p id="dateTime"></p>
                        </div>
                        <div class="weather-icon-large">
                            <img id="weatherIcon" src="" alt="Weather icon">
                        </div>
                    </div>
                    
                    <div class="weather-main">
                        <div class="temperature">
                            <span id="temp"></span>
                            <span class="unit">°C</span>
                        </div>
                        <div class="weather-description">
                            <p id="description"></p>
                            <p id="feelsLike"></p>
                        </div>
                    </div>

                    <div class="weather-details">
                        <div class="detail-item">
                            <i class="fas fa-droplets"></i>
                            <div>
                                <p>Humidity</p>
                                <span id="humidity"></span>
                            </div>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-wind"></i>
                            <div>
                                <p>Wind Speed</p>
                                <span id="windSpeed"></span>
                            </div>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-compress"></i>
                            <div>
                                <p>Pressure</p>
                                <span id="pressure"></span>
                            </div>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-eye"></i>
                            <div>
                                <p>Visibility</p>
                                <span id="visibility"></span>
                            </div>
                        </div>
                    </div>

                    <div class="weather-extra">
                        <div class="extra-item">
                            <i class="fas fa-sun"></i>
                            <div>
                                <p>Sunrise</p>
                                <span id="sunrise"></span>
                            </div>
                        </div>
                        <div class="extra-item">
                            <i class="fas fa-moon"></i>
                            <div>
                                <p>Sunset</p>
                                <span id="sunset"></span>
                            </div>
                        </div>
                        <div class="extra-item">
                            <i class="fas fa-arrow-up"></i>
                            <div>
                                <p>High</p>
                                <span id="highTemp"></span>
                            </div>
                        </div>
                        <div class="extra-item">
                            <i class="fas fa-arrow-down"></i>
                            <div>
                                <p>Low</p>
                                <span id="lowTemp"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 5-Day Forecast -->
            <section id="forecastSection" class="forecast-section hidden">
                <h2><i class="fas fa-calendar"></i> 5-Day Forecast</h2>
                <div id="forecastContainer" class="forecast-container"></div>
            </section>

            <!-- Hourly Forecast -->
            <section id="hourlySection" class="hourly-section hidden">
                <h2><i class="fas fa-clock"></i> Hourly Forecast (Next 24 Hours)</h2>
                <div id="hourlyContainer" class="hourly-container"></div>
            </section>

            <!-- Recent Searches -->
            <section class="recent-searches">
                <h3><i class="fas fa-history"></i> Recent Searches</h3>
                <div id="recentSearches" class="recent-list"></div>
            </section>
        </main>

        <!-- Loading Spinner -->
        <div id="loadingSpinner" class="loading-spinner hidden">
            <div class="spinner"></div>
            <p>Loading weather data...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
